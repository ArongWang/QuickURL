name: shortlink

services:
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    image: shortlink:latest
    container_name: shortlink
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${APP_PORT:-80}:80"
